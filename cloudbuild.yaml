steps:
  # 1. Build la imagen con las credenciales de Supabase bakeadas
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '--build-arg=VITE_SUPABASE_URL=https://sxtlkdlygfyqoklfwcjl.supabase.co'
      - '--build-arg=VITE_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4dGxrZGx5Z2Z5cW9rbGZ3Y2psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDE2NzgsImV4cCI6MjA4OTk3NzY3OH0.9-zK9X71BxDsiDKO2X7W5sSJLInVJR-vkEdO5jaq7CI'
      - '--build-arg=VITE_SUPABASE_PROJECT_ID=sxtlkdlygfyqoklfwcjl'
      - '--build-arg=VITE_WA_SERVER_URL=http://3.143.245.74:3001'
      - '--build-arg=VITE_GROQ_API_KEY=${_GROQ_API_KEY}'
      - '--build-arg=VITE_GEMINI_API_KEY=${_GEMINI_API_KEY}'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pudu-crm:latest'
      - '.'

  # 2. Deploy a Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pudu-crm'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pudu-crm:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pudu-crm:latest'
